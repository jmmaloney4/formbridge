<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormBridge Viewer</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sidebar-width: 320px;
            --topbar-height: 56px;
            --color-bg: #f5f7fa;
            --color-sidebar: #1e2432;
            --color-sidebar-hover: #2a3142;
            --color-text: #1a1a2e;
            --color-text-light: #8b92a5;
            --color-primary: #4a6cf7;
            --color-success: #22c55e;
            --color-warning: #eab308;
            --color-error: #ef4444;
            --color-border: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            height: 100vh;
        }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--topbar-height) 1fr;
            height: 100vh;
        }

        /* Top bar */
        .topbar {
            grid-column: 1 / -1;
            background: white;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 100;
        }

        .topbar-logo {
            font-weight: 700;
            font-size: 18px;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-logo svg {
            width: 24px;
            height: 24px;
        }

        .topbar-filename {
            font-size: 14px;
            color: var(--color-text-light);
            padding: 6px 12px;
            background: var(--color-bg);
            border-radius: var(--radius-sm);
        }

        .topbar-stats {
            display: flex;
            gap: 16px;
            margin-left: auto;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--color-bg);
        }

        .stat-badge.confidence {
            font-weight: 600;
        }

        .stat-badge.confidence.high { color: var(--color-success); }
        .stat-badge.confidence.medium { color: var(--color-warning); }
        .stat-badge.confidence.low { color: var(--color-error); }

        .topbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #3b5de7;
        }

        .btn-secondary {
            background: var(--color-bg);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sidebar */
        .sidebar {
            background: var(--color-sidebar);
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-light);
            margin-bottom: 12px;
        }

        .filter-tabs {
            display: flex;
            gap: 4px;
        }

        .filter-tab {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--color-text-light);
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .filter-tab:hover {
            background: var(--color-sidebar-hover);
        }

        .filter-tab.active {
            background: var(--color-primary);
            color: white;
        }

        .filter-tab .count {
            opacity: 0.7;
            margin-left: 4px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .field-group {
            margin-bottom: 8px;
        }

        .field-group-header {
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-light);
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .field-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-left: 3px solid transparent;
        }

        .field-item:hover {
            background: var(--color-sidebar-hover);
        }

        .field-item.active {
            background: var(--color-sidebar-hover);
            border-left-color: var(--color-primary);
        }

        .field-item.flagged {
            border-left-color: var(--color-warning);
        }

        .field-item.unmapped {
            opacity: 0.5;
        }

        .field-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        .field-indicator.high { background: var(--color-success); }
        .field-indicator.medium { background: var(--color-warning); }
        .field-indicator.low { background: var(--color-error); }
        .field-indicator.blank { background: #6b7280; }

        .field-info {
            flex: 1;
            min-width: 0;
        }

        .field-label {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-label .line-ref {
            color: var(--color-text-light);
            font-weight: 400;
        }

        .field-value {
            font-size: 12px;
            color: var(--color-text-light);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-meta {
            font-size: 11px;
            color: var(--color-text-light);
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        .field-meta .tag {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* Main content area */
        .main-content {
            overflow: auto;
            padding: 20px;
            background: var(--color-bg);
        }

        .pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-height: 100%;
        }

        .page-wrapper {
            position: relative;
            background: white;
            box-shadow: var(--shadow-lg);
        }

        .page-canvas {
            display: block;
        }

        .field-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .field-marker {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
            border: 2px solid transparent;
            border-radius: 2px;
            transition: all 0.15s ease;
        }

        .field-marker:hover {
            border-color: var(--color-primary);
            background: rgba(74, 108, 247, 0.1);
        }

        .field-marker.active {
            border-color: var(--color-primary);
            background: rgba(74, 108, 247, 0.2);
        }

        .field-marker.high { background: rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.3); }
        .field-marker.medium { background: rgba(234, 179, 8, 0.15); border-color: rgba(234, 179, 8, 0.3); }
        .field-marker.low { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); }

        /* Edit modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow: auto;
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-subtitle {
            font-size: 13px;
            color: var(--color-text-light);
            margin-top: 4px;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--color-text-light);
            font-size: 24px;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--color-text);
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            transition: border-color 0.15s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .confidence-badge.high { background: rgba(34, 197, 94, 0.1); color: var(--color-success); }
        .confidence-badge.medium { background: rgba(234, 179, 8, 0.1); color: var(--color-warning); }
        .confidence-badge.low { background: rgba(239, 68, 68, 0.1); color: var(--color-error); }

        .reasoning-box {
            background: var(--color-bg);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--color-text-light);
            line-height: 1.5;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--color-text-light);
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 16px;
            background: var(--color-sidebar);
            color: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left: 4px solid var(--color-success); }
        .toast.error { border-left: 4px solid var(--color-error); }
        .toast.warning { border-left: 4px solid var(--color-warning); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
            color: var(--color-text-light);
            max-width: 300px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .sidebar ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        .sidebar ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                FormBridge
            </div>
            <div class="topbar-filename" id="filename">Loading...</div>
            <div class="topbar-stats">
                <div class="stat-badge">
                    <span id="fields-filled">0</span> filled
                </div>
                <div class="stat-badge">
                    <span id="fields-flagged">0</span> flagged
                </div>
                <div class="stat-badge confidence" id="confidence-badge">
                    <span id="confidence-score">-</span>
                </div>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-secondary" id="btn-export" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5l5 5 5-5m-5 5V3"/>
                    </svg>
                    Export Mapping
                </button>
                <button class="btn btn-primary" id="btn-save" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17,21 17,13 7,13 7,21"/>
                        <polyline points="7,3 7,8 15,8"/>
                    </svg>
                    Save PDF
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Fields</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">
                        All <span class="count" id="count-all">0</span>
                    </button>
                    <button class="filter-tab" data-filter="flagged">
                        Flagged <span class="count" id="count-flagged">0</span>
                    </button>
                    <button class="filter-tab" data-filter="blank">
                        Blank <span class="count" id="count-blank">0</span>
                    </button>
                </div>
            </div>
            <div class="sidebar-content" id="fields-list">
                <!-- Fields will be rendered here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <div class="pdf-container" id="pdf-container">
                <!-- PDF pages will be rendered here -->
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="modal-field-label">Field</div>
                    <div class="modal-subtitle" id="modal-field-id">field_001</div>
                </div>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Value</label>
                    <input type="text" class="form-input" id="modal-value-input" placeholder="Enter value...">
                </div>
                <div class="form-group">
                    <label class="form-label">Confidence</label>
                    <div class="confidence-badge" id="modal-confidence">
                        <span id="modal-confidence-value">0.95</span>
                    </div>
                </div>
                <div class="form-group" id="modal-reasoning-group">
                    <label class="form-label">Reasoning</label>
                    <div class="reasoning-box" id="modal-reasoning">-</div>
                </div>
                <div class="form-group" id="modal-source-group">
                    <label class="form-label">Source Data Key</label>
                    <div class="reasoning-box" id="modal-source">-</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-save">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Loading PDF...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>

    <script type="module">
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';

        // Set worker path
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

        // Viewer state
        const state = {
            schema: null,
            mapping: null,
            pdfDoc: null,
            pdfBytes: null,
            pageCanvases: [],
            currentPage: 1,
            scale: 1.5,
            selectedFieldId: null,
            filter: 'all',
            modified: false
        };

        // DOM elements
        const elements = {
            filename: document.getElementById('filename'),
            fieldsFilled: document.getElementById('fields-filled'),
            fieldsFlagged: document.getElementById('fields-flagged'),
            confidenceBadge: document.getElementById('confidence-badge'),
            confidenceScore: document.getElementById('confidence-score'),
            fieldsList: document.getElementById('fields-list'),
            pdfContainer: document.getElementById('pdf-container'),
            mainContent: document.getElementById('main-content'),
            loadingOverlay: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
            editModal: document.getElementById('edit-modal'),
            modalFieldLabel: document.getElementById('modal-field-label'),
            modalFieldId: document.getElementById('modal-field-id'),
            modalValueInput: document.getElementById('modal-value-input'),
            modalConfidence: document.getElementById('modal-confidence'),
            modalConfidenceValue: document.getElementById('modal-confidence-value'),
            modalReasoning: document.getElementById('modal-reasoning'),
            modalReasoningGroup: document.getElementById('modal-reasoning-group'),
            modalSource: document.getElementById('modal-source'),
            modalSourceGroup: document.getElementById('modal-source-group'),
            modalClose: document.getElementById('modal-close'),
            modalCancel: document.getElementById('modal-cancel'),
            modalSave: document.getElementById('modal-save'),
            btnSave: document.getElementById('btn-save'),
            btnExport: document.getElementById('btn-export'),
            countAll: document.getElementById('count-all'),
            countFlagged: document.getElementById('count-flagged'),
            countBlank: document.getElementById('count-blank')
        };

        // Helper functions
        function showLoading(text = 'Loading...') {
            elements.loadingText.textContent = text;
            elements.loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            elements.loadingOverlay.style.display = 'none';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function getConfidenceClass(confidence) {
            if (confidence >= 0.95) return 'high';
            if (confidence >= 0.80) return 'medium';
            return 'low';
        }

        function getFieldMapping(fieldId) {
            if (!state.mapping) return null;

            // Check regular mappings
            for (const m of state.mapping.mappings) {
                if (m.field_id === fieldId) return m;
            }

            // Check calculations
            for (const c of state.mapping.calculations) {
                if (c.field_id === fieldId) return c;
            }

            return null;
        }

        function getFieldValue(fieldId) {
            const mapping = getFieldMapping(fieldId);
            return mapping ? mapping.value : null;
        }

        function getFieldConfidence(fieldId) {
            const mapping = getFieldMapping(fieldId);
            return mapping ? mapping.confidence : 0;
        }

        function calculateOverallConfidence() {
            if (!state.mapping || !state.mapping.mappings.length) return 0;

            const allMappings = [...state.mapping.mappings, ...state.mapping.calculations];
            if (!allMappings.length) return 0;

            const sum = allMappings.reduce((acc, m) => acc + (m.confidence || 0), 0);
            return sum / allMappings.length;
        }

        // Fetch functions
        async function fetchSchema() {
            try {
                const response = await fetch('/schema');
                if (!response.ok) throw new Error('Failed to fetch schema');
                state.schema = await response.json();
                return state.schema;
            } catch (error) {
                console.error('Error fetching schema:', error);
                return null;
            }
        }

        async function fetchMapping() {
            try {
                const response = await fetch('/mapping');
                if (!response.ok) throw new Error('Failed to fetch mapping');
                state.mapping = await response.json();
                return state.mapping;
            } catch (error) {
                console.error('Error fetching mapping:', error);
                return null;
            }
        }

        async function fetchPdf() {
            try {
                const response = await fetch('/pdf');
                if (!response.ok) throw new Error('Failed to fetch PDF');
                state.pdfBytes = await response.arrayBuffer();
                return state.pdfBytes;
            } catch (error) {
                console.error('Error fetching PDF:', error);
                throw error;
            }
        }

        async function updateField(fieldId, value) {
            try {
                const response = await fetch('/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ field_id: fieldId, value })
                });

                if (!response.ok) throw new Error('Failed to update field');

                const result = await response.json();

                if (result.success) {
                    // Refresh PDF
                    await fetchPdf();
                    await renderPdf();

                    // Refresh mapping
                    await fetchMapping();
                    renderFieldsList();
                    updateStats();

                    state.modified = true;
                    elements.btnSave.disabled = false;

                    return true;
                }
            } catch (error) {
                console.error('Error updating field:', error);
                showToast('Failed to update field', 'error');
            }
            return false;
        }

        async function savePdf() {
            try {
                showLoading('Saving PDF...');

                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`Saved to ${result.path}`, 'success');
                    state.modified = false;
                    elements.btnSave.disabled = true;
                } else {
                    throw new Error(result.error || 'Failed to save');
                }
            } catch (error) {
                console.error('Error saving PDF:', error);
                showToast('Failed to save PDF', 'error');
            } finally {
                hideLoading();
            }
        }

        // Render functions
        function renderFieldsList() {
            if (!state.schema) {
                elements.fieldsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-title">No Fields</div>
                        <div class="empty-state-text">No form fields were detected in this PDF.</div>
                    </div>
                `;
                return;
            }

            // Group fields by page
            const byPage = {};
            state.schema.fields.forEach(field => {
                if (!byPage[field.page]) byPage[field.page] = [];
                byPage[field.page].push(field);
            });

            let html = '';
            let allCount = 0, flaggedCount = 0, blankCount = 0;

            for (const page of Object.keys(byPage).sort((a, b) => a - b)) {
                const fields = byPage[page];
                html += `<div class="field-group">
                    <div class="field-group-header">Page ${page}</div>`;

                fields.forEach(field => {
                    const mapping = getFieldMapping(field.id);
                    const value = mapping ? mapping.value : null;
                    const confidence = mapping ? mapping.confidence : 0;
                    const confClass = value ? getConfidenceClass(confidence) : 'blank';
                    const isFlagged = value && confidence < 0.95;
                    const isBlank = !value;

                    allCount++;
                    if (isFlagged) flaggedCount++;
                    if (isBlank) blankCount++;

                    // Apply filter
                    let hidden = false;
                    if (state.filter === 'flagged' && !isFlagged) hidden = true;
                    if (state.filter === 'blank' && !isBlank) hidden = true;

                    const displayValue = value || '(blank)';
                    const lineRef = field.line_ref ? `<span class="line-ref">Line ${field.line_ref}</span>` : '';
                    const label = field.label || field.id;

                    html += `
                        <div class="field-item ${isFlagged ? 'flagged' : ''} ${isBlank ? 'unmapped' : ''}"
                             data-field-id="${field.id}"
                             style="${hidden ? 'display: none;' : ''}">
                            <div class="field-indicator ${confClass}"></div>
                            <div class="field-info">
                                <div class="field-label">${lineRef} ${label}</div>
                                <div class="field-value">${displayValue}</div>
                                ${mapping ? `
                                    <div class="field-meta">
                                        <span class="tag">${(confidence * 100).toFixed(0)}%</span>
                                        ${mapping.calculated ? '<span class="tag">calculated</span>' : ''}
                                        ${mapping.source_key ? `<span class="tag">${mapping.source_key}</span>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            }

            elements.fieldsList.innerHTML = html;

            // Update counts
            elements.countAll.textContent = allCount;
            elements.countFlagged.textContent = flaggedCount;
            elements.countBlank.textContent = blankCount;

            // Add click handlers
            document.querySelectorAll('.field-item').forEach(item => {
                item.addEventListener('click', () => {
                    const fieldId = item.dataset.fieldId;
                    selectField(fieldId);
                });
            });
        }

        async function renderPdf() {
            if (!state.pdfBytes) return;

            state.pdfDoc = await pdfjsLib.getDocument({ data: state.pdfBytes }).promise;

            elements.pdfContainer.innerHTML = '';
            state.pageCanvases = [];

            for (let pageNum = 1; pageNum <= state.pdfDoc.numPages; pageNum++) {
                const page = await state.pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: state.scale });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.dataset.page = pageNum;
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';

                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const overlay = document.createElement('div');
                overlay.className = 'field-overlay';
                overlay.dataset.page = pageNum;

                wrapper.appendChild(canvas);
                wrapper.appendChild(overlay);
                elements.pdfContainer.appendChild(wrapper);

                state.pageCanvases.push({ canvas, overlay, pageNum, viewport });

                // Render page
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport }).promise;

                // Render field markers
                renderFieldMarkers(pageNum, viewport, overlay);
            }
        }

        function renderFieldMarkers(pageNum, viewport, overlay) {
            if (!state.schema) return;

            overlay.innerHTML = '';

            const pageFields = state.schema.fields.filter(f => f.page === pageNum);

            pageFields.forEach(field => {
                if (!field.position) return;

                const mapping = getFieldMapping(field.id);
                const value = mapping ? mapping.value : null;
                const confidence = mapping ? mapping.confidence : 0;
                const confClass = value ? getConfidenceClass(confidence) : 'blank';

                // Convert PDF coordinates to canvas coordinates
                // PDF coords: origin bottom-left, y increases up
                // Canvas coords: origin top-left, y increases down
                const x = field.position.x * state.scale;
                const y = viewport.height - (field.position.y + field.position.h) * state.scale;
                const w = field.position.w * state.scale;
                const h = field.position.h * state.scale;

                const marker = document.createElement('div');
                marker.className = `field-marker ${confClass}`;
                marker.dataset.fieldId = field.id;
                marker.style.left = x + 'px';
                marker.style.top = y + 'px';
                marker.style.width = w + 'px';
                marker.style.height = h + 'px';
                marker.title = field.label || field.id;

                marker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectField(field.id);
                });

                overlay.appendChild(marker);
            });
        }

        function selectField(fieldId) {
            // Update active states
            document.querySelectorAll('.field-item').forEach(item => {
                item.classList.toggle('active', item.dataset.fieldId === fieldId);
            });

            document.querySelectorAll('.field-marker').forEach(marker => {
                marker.classList.toggle('active', marker.dataset.fieldId === fieldId);
            });

            state.selectedFieldId = fieldId;

            // Open edit modal
            openEditModal(fieldId);
        }

        function openEditModal(fieldId) {
            if (!state.schema) return;

            const field = state.schema.fields.find(f => f.id === fieldId);
            if (!field) return;

            const mapping = getFieldMapping(fieldId);
            const value = mapping ? mapping.value : '';
            const confidence = mapping ? mapping.confidence : 0;
            const confClass = getConfidenceClass(confidence);

            elements.modalFieldLabel.textContent = field.label || 'Field';
            elements.modalFieldId.textContent = fieldId + (field.line_ref ? ` (Line ${field.line_ref})` : '');
            elements.modalValueInput.value = value || '';

            elements.modalConfidence.className = `confidence-badge ${confClass}`;
            elements.modalConfidenceValue.textContent = (confidence * 100).toFixed(0) + '%';

            if (mapping && mapping.reasoning) {
                elements.modalReasoningGroup.style.display = 'block';
                elements.modalReasoning.textContent = mapping.reasoning;
            } else {
                elements.modalReasoningGroup.style.display = 'none';
            }

            if (mapping && mapping.source_key) {
                elements.modalSourceGroup.style.display = 'block';
                elements.modalSource.textContent = mapping.source_key;
            } else {
                elements.modalSourceGroup.style.display = 'none';
            }

            elements.editModal.classList.add('active');
            elements.modalValueInput.focus();
        }

        function closeEditModal() {
            elements.editModal.classList.remove('active');
            state.selectedFieldId = null;

            document.querySelectorAll('.field-item').forEach(item => {
                item.classList.remove('active');
            });

            document.querySelectorAll('.field-marker').forEach(marker => {
                marker.classList.remove('active');
            });
        }

        function updateStats() {
            if (!state.schema || !state.mapping) return;

            const allMappings = [...state.mapping.mappings, ...state.mapping.calculations];
            const filled = allMappings.filter(m => m.value).length;
            const flagged = allMappings.filter(m => m.value && m.confidence < 0.95).length;
            const overallConf = calculateOverallConfidence();

            elements.fieldsFilled.textContent = filled;
            elements.fieldsFlagged.textContent = flagged;
            elements.confidenceScore.textContent = (overallConf * 100).toFixed(0) + '%';

            const confClass = getConfidenceClass(overallConf);
            elements.confidenceBadge.className = `stat-badge confidence ${confClass}`;

            // Enable export button if we have mapping
            elements.btnExport.disabled = !state.mapping;
        }

        // Event handlers
        function setupEventHandlers() {
            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    state.filter = tab.dataset.filter;
                    renderFieldsList();
                });
            });

            // Modal events
            elements.modalClose.addEventListener('click', closeEditModal);
            elements.modalCancel.addEventListener('click', closeEditModal);

            elements.editModal.addEventListener('click', (e) => {
                if (e.target === elements.editModal) closeEditModal();
            });

            elements.modalSave.addEventListener('click', async () => {
                if (!state.selectedFieldId) return;

                const newValue = elements.modalValueInput.value;

                showLoading('Updating field...');
                const success = await updateField(state.selectedFieldId, newValue);
                hideLoading();

                if (success) {
                    closeEditModal();
                    showToast('Field updated successfully', 'success');
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && elements.editModal.classList.contains('active')) {
                    closeEditModal();
                }

                // Ctrl+S to save
                if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    if (!elements.btnSave.disabled) {
                        savePdf();
                    }
                }
            });

            // Save button
            elements.btnSave.addEventListener('click', savePdf);

            // Export button
            elements.btnExport.addEventListener('click', () => {
                if (!state.mapping) return;

                const blob = new Blob([JSON.stringify(state.mapping, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mapping.json';
                a.click();
                URL.revokeObjectURL(url);

                showToast('Mapping exported', 'success');
            });
        }

        // Initialize
        async function init() {
            showLoading('Loading PDF...');

            try {
                // Fetch data
                await fetchSchema();
                await fetchMapping();
                await fetchPdf();

                // Update UI
                if (state.schema) {
                    elements.filename.textContent = state.schema.source_file || 'form.pdf';
                }

                // Render
                await renderPdf();
                renderFieldsList();
                updateStats();

                hideLoading();

            } catch (error) {
                console.error('Initialization error:', error);
                hideLoading();

                elements.pdfContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-title">Error Loading PDF</div>
                        <div class="empty-state-text">${error.message}</div>
                    </div>
                `;
            }
        }

        // Setup and run
        setupEventHandlers();
        init();
    </script>
</body>
</html>
